<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Lexend:wght@100..900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #ffffff;
            color: #595959;
            padding: 40px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Login Controls (Hidden after login) */
        #login-controls {
            text-align: center;
            margin-bottom: 30px;
        }
        button {
            padding: 10px 15px;
            font-family: 'Lexend', sans-serif;
            font-size: 14px;
            cursor: pointer;
            background-color: #f1f1f1;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        /* Storyboard Main Header */
        h1.main-heading {
            font-family: 'Caveat', cursive;
            font-size: 4rem;
            color: #595959;
            text-align: center;
            margin-bottom: 50px;
            font-weight: 500;
        }

        /* Event Row Layout */
        .event-item {
            display: flex;
            align-items: baseline;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .event-title {
            white-space: nowrap;
        }

        .event-dots {
            flex-grow: 1;
            border-bottom: 3px dotted;
            opacity: 0.4;
            margin: 0 15px;
        }

        .event-time {
            white-space: nowrap;
        }

        /* Storyboard Footer */
        .footer-note {
            font-family: 'Caveat', cursive;
            font-size: 2rem;
            color: #595959;
            margin-top: 60px;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Packing List Boxes */
        .packing-lists {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .packing-box {
            flex: 1;
            background-color: #f3f3f3;
            border-radius: 20px;
            padding: 40px 20px 20px 20px;
            position: relative;
            min-height: 150px;
        }

        /* Box Outlines */
        .box-jack { border: 2px solid #01ba01; }
        .box-hannah { border: 2px solid #ff00ff; }

        /* Name Labels in Top Right */
        .box-label {
            position: absolute;
            top: 15px;
            right: 25px;
            font-family: 'Lexend', sans-serif;
            font-weight: 200;
            color: #595959;
            font-size: 1.2rem;
        }

        /* Dynamic Description Text */
        .box-content-item {
            font-family: 'Lexend', sans-serif;
            font-weight: 400;
            color: #595959;
            font-size: 1rem;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        /* Mobile Responsiveness Adjustments */
        @media (max-width: 600px) {
            body { padding: 20px; }
            h1.main-heading { font-size: 2.8rem; margin-bottom: 30px; }
            .event-item { font-size: 1.2rem; }
            .footer-note { font-size: 1.5rem; }
            .packing-lists { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div id="login-controls">
        <button id="authorize_button" onclick="handleAuthClick()" style="visibility: hidden;">Log In to Load Dashboard</button>
    </div>

    <div id="dashboard-content" style="display: none;">
        <h1 class="main-heading">What's happening today?</h1>
        
        <div id="events-container">
            </div>

        <div class="footer-note">
            What do I need to take with me to be successful today?
        </div>

        <div class="packing-lists">
            <div class="packing-box box-jack">
                <div class="box-label">Jack</div>
                <div id="jack-content"></div>
            </div>
            <div class="packing-box box-hannah">
                <div class="box-label">Hannah</div>
                <div id="hannah-content"></div>
            </div>
        </div>
    </div>

    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <script>
        // ===================================================
        // LINE 1 & 2: CONFIGURATION LAYER 
        // ===================================================
        const API_KEY = "AIzaSyBtl_YfFluC9pVI11tAoWjyF0upT7Dses0";
        const CLIENT_ID = "747390244463-oe1rfnhhb19cgkm3pfc2g6vakvs0sp1u.apps.googleusercontent.com";
        
        // Internal Application Constants
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
        const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';

        let tokenClient;
        let gapiInited = false;
        let gisInited = false;

        function gapiLoaded() {
            gapi.load('client', intializeGapiClient);
        }

        async function intializeGapiClient() {
            await gapi.client.init({
                apiKey: API_KEY,
                discoveryDocs: [DISCOVERY_DOC],
            });
            gapiInited = true;
            maybeEnableButtons();
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '', 
            });
            gisInited = true;
            maybeEnableButtons();
        }

function maybeEnableButtons() {
            if (gapiInited && gisInited) {
                // 1. Check if we have a saved token in the browser's storage
                const savedTokenStr = localStorage.getItem('calendar_token');
                if (savedTokenStr) {
                    const savedToken = JSON.parse(savedTokenStr);
                    // 2. Check if the token is still valid (they expire after 1 hour)
                    if (Date.now() < savedToken.expires - 60000) { 
                        // Token is good! Apply it and load the dashboard instantly.
                        gapi.client.setToken({ access_token: savedToken.token });
                        document.getElementById('login-controls').style.display = 'none';
                        document.getElementById('dashboard-content').style.display = 'block';
                        listUpcomingEvents();
                        return; // Stop here so we don't show the login button
                    } else {
                        // Token is expired, clear it out.
                        localStorage.removeItem('calendar_token');
                    }
                }
                
                // 3. If no valid token is found, show the login button
                document.getElementById('authorize_button').style.visibility = 'visible';
            }
        }

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) {
                    throw (resp);
                }
                
                // Save the new token and its exact expiration time to local storage
                localStorage.setItem('calendar_token', JSON.stringify({
                    token: resp.access_token,
                    expires: Date.now() + (resp.expires_in * 1000)
                }));

                document.getElementById('login-controls').style.display = 'none';
                document.getElementById('dashboard-content').style.display = 'block';
                await listUpcomingEvents();
            };

            tokenClient.requestAccessToken();
        }

        function getEventColor(title) {
            const firstLetter = title.trim().charAt(0).toUpperCase();
            switch(firstLetter) {
                case 'D': return '#4a86e8'; 
                case 'E': return '#9900ff'; 
                case 'J': return '#01ba01'; 
                case 'H': return '#ff00ff'; 
                default:  return '#595959'; 
            }
        }

        function get12HourTime(dateTimeString) {
            const dateObj = new Date(dateTimeString);
            let hours = dateObj.getHours();
            let minutes = dateObj.getMinutes().toString().padStart(2, '0');
            hours = hours % 12 || 12;
            return `${hours}:${minutes}`;
        }

        async function listUpcomingEvents() {
            const container = document.getElementById('events-container');
            const jackContainer = document.getElementById('jack-content');
            const hannahContainer = document.getElementById('hannah-content');
            
            container.innerHTML = '<p style="text-align:center;">Loading today\'s schedule...</p>';
            jackContainer.innerHTML = '';
            hannahContainer.innerHTML = '';
            
            try {
                const todayStart = new Date();
                todayStart.setHours(0, 0, 0, 0);
                
                const todayEnd = new Date();
                todayEnd.setHours(23, 59, 59, 999);

                const request = {
                    'calendarId': 'primary',
                    'timeMin': todayStart.toISOString(),
                    'timeMax': todayEnd.toISOString(),
                    'showDeleted': false,
                    'singleEvents': true,
                    'maxResults': 50,
                    'orderBy': 'startTime',
                };
                
                const response = await gapi.client.calendar.events.list(request);
                const events = response.result.items;

                container.innerHTML = ''; 

                if (!events || events.length == 0) {
                    container.innerHTML = '<p style="text-align:center;">Nothing scheduled for today!</p>';
                    return;
                }
                
                events.forEach(event => {
                    const title = event.summary || 'Untitled Event';
                    const firstLetter = title.trim().charAt(0).toUpperCase();
                    const eventColor = getEventColor(title);
                    
                    let timeDisplay = 'All Day';
                    if (event.start.dateTime && event.end.dateTime) {
                        const startStr = get12HourTime(event.start.dateTime);
                        const endStr = get12HourTime(event.end.dateTime);
                        timeDisplay = `${startStr} - ${endStr}`;
                    }
                    
                    const eventDiv = document.createElement('div');
                    eventDiv.className = 'event-item';
                    eventDiv.style.color = eventColor; 
                    
                    eventDiv.innerHTML = `
                        <span class="event-title">${title}</span>
                        <span class="event-dots"></span>
                        <span class="event-time">${timeDisplay}</span>
                    `;
                    container.appendChild(eventDiv);

                    if (event.description) {
                        const descDiv = document.createElement('div');
                        descDiv.className = 'box-content-item';
                        descDiv.innerHTML = `<strong>${title}:</strong><br>${event.description}`;
                        
                        if (firstLetter === 'J') {
                            jackContainer.appendChild(descDiv);
                        } else if (firstLetter === 'H') {
                            hannahContainer.appendChild(descDiv);
                        }
                    }
                });
            } catch (err) {
                container.innerHTML = `<p style="color:red; text-align:center;">Error fetching events: ${err.message}</p>`;
            }
        }
    </script>
</body>
</html>
